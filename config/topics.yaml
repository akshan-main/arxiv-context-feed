      - adapter
      - lora
      - qlora
      - rlhf
      - dpo
      - peft
      - grpo
      - sft
      - rlaif
    phrases:
      - fine-tuning
      - instruction tuning
      - parameter efficient
      - prompt engineering
      - prompt tuning
      - supervised fine-tuning
      - low-rank adaptation
      - reinforcement learning from human feedback
      - direct preference optimization
      - reward model
      - preference learning
      - constitutional ai
      - safety alignment
      - safety training
      - model merging
      - synthetic data
      - data augmentation
      - curriculum learning
      - chat template
      - system prompt
      - few-shot learning
      - in-context learning
      - zero-shot
    negatives:
      - hyperparameter tuning
      - neural architecture search
    inclusion_notes: >
      Include papers on methods for adapting, aligning, or customizing LLMs.
      Accept papers on prompt design, instruction formatting, and
      parameter-efficient training methods.
    exclusion_notes: >
      Exclude papers on general hyperparameter optimization without
      LLM focus. Exclude pre-training papers (this topic is about post-training).
    enabled: true

  - key: generative-ai-foundations
    name: Generative AI & NLP Foundations
    description: >
      Foundational research in generative AI, transformer architectures,
      NLP methods, and chatbot systems.
    arxiv_categories:
      - cs.CL
      - cs.AI
      - cs.LG
    keywords:
      # Specific to NLP/LLM foundations — low ambiguity
      - chatbot
      - nlp
      - tokenizer
      - tokenization
      - multilingual
    phrases:
      - generative AI
      - natural language processing
      - transformer architecture
      - chatbot system
      - language generation
      - language model
      - large language model
      - foundation model
      - scaling law
      - pre-training
      - model architecture
      - sequence to sequence
      - text generation
      - causal language model
      - masked language model
      - vision language
      - multimodal model
      - encoder decoder
    negatives:
      - generative adversarial
      - image generation
      - music generation
      - video generation
      - image classification
      - object detection
      - speech synthesis
    inclusion_notes: >
      Include papers that advance foundational generative AI / NLP methods
      relevant to LLMs. The paper should make a MEANINGFUL contribution -
      not just use transformers as a tool.
    exclusion_notes: >
      Exclude papers that merely use transformers/NLP as infrastructure
      for an unrelated domain. Exclude image/audio/video generation.
      This topic has intentionally broad keywords - the judge must be
      selective about quality and relevance.
    enabled: true
