# LLM Judge Configuration
# Controls the Stage 2 abstract evaluation.
# Edit via Google Form -> Issue -> PR workflow (whitelisted fields only).
#
# Provider: Cerebras (OpenAI-compatible /v1/chat/completions).
# On rate limit (HTTP 429), rotates keys round-robin.
#
# Env vars:
#   LLM_BASE_URL=https://api.cerebras.ai/v1
#   LLM_API_KEYS=key1,key2  (comma-separated for rotation)
#
# DISCOVERY AGENT uses DISCOVERY_* env vars if set, else falls back to LLM_*.
#
provider: cerebras
model_id: gpt-oss-120b

# Prompt version (bumped on any template change)
prompt_version: 5

# Strictness preset: low, medium, or high
strictness: medium

# Strictness presets define quality thresholds.
# Calibrated for gpt-oss-120b (scores ~5-10 points higher than Opus 4.6).
# All values are integers 0-100.
strictness_presets:
  low:
    min_quality_i: 50
  medium:
    min_quality_i: 65
  high:
    min_quality_i: 85

# Maximum number of evidence quotes from abstract
max_evidence_quotes: 3

# Maximum length of rationale in characters
max_rationale_length: 300

# Fields that can be edited via Google Form (whitelist)
editable_fields:
  - provider
  - model_id
  - strictness
  - max_evidence_quotes
