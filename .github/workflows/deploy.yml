name: Deploy to Oracle Cloud

on:
  push:
    branches: [main]
    paths-ignore:
      - 'chatbot/**'
      - 'docs/**'
      - '*.md'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            cd ~/arxiv-context-feed
            git pull origin main
            source .venv/bin/activate
            pip install -e ".[local-llm,reddit]" --quiet

            # Restart server only if llm/ or judge/ files changed
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'src/contextual_arxiv_feed/llm/' 'src/contextual_arxiv_feed/judge/' 'deploy/llama-server.service')
            if [ -n "$CHANGED" ]; then
              echo "LLM-related files changed, restarting server..."
              sudo systemctl restart llama-server
              sleep 5
              curl -s http://127.0.0.1:8080/health || echo "WARNING: Server health check failed"
            fi

            echo "Deploy complete at $(date -u)"
